name: Build P-Control APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Add Android platform (first run only)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            npx cap sync android
          fi

      - name: Force landscape orientation
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q 'android:screenOrientation="landscape"' "$MANIFEST"; then
            sed -i '/android:name=".MainActivity"/a\            android:screenOrientation="landscape"' "$MANIFEST"
          fi
          cat "$MANIFEST"

      - name: Allow cleartext (ws:// and http://) traffic to LAN devices
        run: |
          # This is the actual fix for OBS not connecting: Capacitor's default
          # network_security_config.xml only allows cleartext to "localhost".
          # A networkSecurityConfig resource reference always overrides a plain
          # usesCleartextTraffic="true" attribute, so that attribute alone does
          # nothing here. We overwrite the resource itself to allow cleartext
          # traffic to any host, which is required to reach OBS/vMix on your LAN.
          RES_XML=android/app/src/main/res/xml/network_security_config.xml
          mkdir -p "$(dirname "$RES_XML")"
          cat > "$RES_XML" << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<network-security-config>
    <base-config cleartextTrafficPermitted="true">
        <trust-anchors>
            <certificates src="system" />
        </trust-anchors>
    </base-config>
</network-security-config>
EOF

          MANIFEST=android/app/src/main/AndroidManifest.xml

          # Make sure the manifest actually references this file.
          if ! grep -q 'android:networkSecurityConfig' "$MANIFEST"; then
            sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/' "$MANIFEST"
          fi

          # Belt-and-braces: also set usesCleartextTraffic in case a future
          # Capacitor version stops shipping a networkSecurityConfig by default.
          if ! grep -q 'android:usesCleartextTraffic' "$MANIFEST"; then
            sed -i 's/<application/<application android:usesCleartextTraffic="true"/' "$MANIFEST"
          fi

          echo "--- network_security_config.xml ---"
          cat "$RES_XML"
          echo "--- AndroidManifest.xml ---"
          cat "$MANIFEST"

      - name: Build APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: P-Control-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
